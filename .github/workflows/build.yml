name: Build

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: Starlight-linux-x86_64
            path: target/release/Starlight
          - os: windows-latest
            artifact: Starlight-windows-x86_64
            path: target/release/Starlight.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install system libraries
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libfontconfig1-dev \
            libfreetype-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev \
            libwayland-dev \
            libx11-dev \
            libxcursor-dev \
            libxi-dev \
            libxcb1-dev \
            libgl-dev \
            libvulkan-dev

      - name: cargo build --release
        run: cargo build --release

      # Compile the installer on every push so a broken script is caught
      # here instead of during a tagged release.
      - name: Build installer
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" /O"." packaging\windows\starlight.iss

      # Same idea for the AppImage — it's cheap to validate per push.
      # (The Flatpak bundle needs a ~1 GB runtime download, so that one is
      # only built at release time.)
      - name: Build AppImage
        if: runner.os == 'Linux'
        run: bash packaging/linux/build-appimage.sh

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.path }}
          if-no-files-found: error
