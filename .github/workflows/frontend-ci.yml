name: Frontend CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "src-tauri/**"
      - "README.md"
  pull_request:
    branches: [main]
    paths-ignore:
      - "src-tauri/**"
      - "README.md"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: voidzero-dev/setup-vp@v1
        with:
          cache: true
          run-install: true
      - run: echo "PUBLIC_API_URL=https://starlight.allofus.dev" > .env
      - run: vp check
      - run: vpr svelte-check
      - run: vp build
