name: Release

on:
  push:
    tags: ["v*.*.*"]

jobs:
  release-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      # The updater compares the running binary's CARGO_PKG_VERSION against
      # the release tag — a mismatch ships an updater that never settles.
      - name: Check tag matches Cargo.toml version
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}".TrimStart("v")
          $manifest = (Select-String -Path Cargo.toml -Pattern '^version = "(.+)"').Matches[0].Groups[1].Value
          if ($tag -ne $manifest) {
            Write-Error "Tag v$tag does not match Cargo.toml version $manifest. Bump Cargo.toml before tagging."
            exit 1
          }

      - name: cargo build --release
        run: cargo build --release

      - name: Rename binary
        run: Copy-Item target/release/Starlight.exe Starlight-windows-x86_64.exe

      # The updater matches release assets by exact name — keep the portable
      # exe named Starlight-windows-x86_64.exe.
      - name: Build installer
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" /DMyAppVersion=$version /O"." packaging\windows\starlight.iss

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            Starlight-windows-x86_64.exe
            Starlight-Setup-x86_64.exe
          draft: true

  release-linux:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      # The updater compares the running binary's CARGO_PKG_VERSION against
      # the release tag — a mismatch ships an updater that never settles.
      - name: Check tag matches Cargo.toml version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          manifest=$(grep -m1 '^version = "' Cargo.toml | sed -E 's/version = "(.+)"/\1/')
          if [ "$tag" != "$manifest" ]; then
            echo "::error::Tag v$tag does not match Cargo.toml version $manifest. Bump Cargo.toml before tagging."
            exit 1
          fi

      - name: Install system libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libfontconfig1-dev \
            libfreetype-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev \
            libwayland-dev \
            libx11-dev \
            libxcursor-dev \
            libxi-dev \
            libxcb1-dev \
            libgl-dev \
            libvulkan-dev

      - name: cargo build --release
        run: cargo build --release

      - name: Rename binary
        run: cp target/release/Starlight Starlight-linux-x86_64

      # Debian/RPM versions can't contain hyphens in the upstream part, so
      # 2.0.0-beta.3 becomes 2.0.0~beta.3 (~ also sorts before the final release).
      - name: Build .deb and .rpm
        run: |
          curl -fsSL https://github.com/goreleaser/nfpm/releases/download/v2.43.1/nfpm_2.43.1_Linux_x86_64.tar.gz | tar -xz nfpm
          export NFPM_VERSION="$(echo "${GITHUB_REF_NAME#v}" | sed 's/-/~/')"
          ./nfpm package -f packaging/linux/nfpm.yaml -p deb -t Starlight-linux-x86_64.deb
          ./nfpm package -f packaging/linux/nfpm.yaml -p rpm -t Starlight-linux-x86_64.rpm

      - name: Build AppImage
        run: bash packaging/linux/build-appimage.sh

      - name: Build Flatpak bundle
        run: |
          sudo apt-get install -y flatpak flatpak-builder
          flatpak remote-add --user --if-not-exists flathub https://dl.flathub.org/repo/flathub.flatpakrepo
          flatpak install --user -y flathub org.freedesktop.Platform//24.08 org.freedesktop.Sdk//24.08
          flatpak-builder --user --force-clean --repo=flatpak-repo flatpak-build packaging/linux/dev.allofus.Starlight.yml
          flatpak build-bundle flatpak-repo Starlight-linux-x86_64.flatpak dev.allofus.Starlight

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            Starlight-linux-x86_64
            Starlight-linux-x86_64.deb
            Starlight-linux-x86_64.rpm
            Starlight-linux-x86_64.AppImage
            Starlight-linux-x86_64.flatpak
          generate_release_notes: true
          draft: true
